services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mcoreos
      POSTGRES_PASSWORD: mcoreos
      POSTGRES_DB: mcoreos_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcoreos -d mcoreos_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
